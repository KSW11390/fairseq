# @package _group_
#
# Layer-wise Hard CE Distillation — k=32+512, 8% frame masking
# All 12 student layers supervised by both k=32 and k=512 codebooks per layer (24 total).
# Same as hubert_layerwise_distill.yaml but mask_prob=0.08 instead of 0.80.
#
# Usage:
#   fairseq-hydra-train \
#     --config-dir examples/hubert/config/pretrain \
#     --config-name hubert_layerwise_both_mask8 \
#     task.data=/workspace/data/manifests \
#     task.label_dir=/workspace/labels \
#     hydra.run.dir=/workspace/exp_mask_both

common:
  fp16: false
  bf16: true
  log_format: json
  log_interval: 100
  seed: 1337
  tensorboard_logdir: tblog

checkpoint:
  save_interval_updates: 10000
  keep_interval_updates: 2
  no_epoch_checkpoints: true

distributed_training:
  ddp_backend: legacy_ddp
  distributed_world_size: 1
  distributed_port: 29679
  nprocs_per_node: 1
  find_unused_parameters: true

task:
  _name: hubert_pretraining
  data: ???
  label_dir: ???
  labels:
    - l1k32
    - l1k512
    - l2k32
    - l2k512
    - l3k32
    - l3k512
    - l4k32
    - l4k512
    - l5k32
    - l5k512
    - l6k32
    - l6k512
    - l7k32
    - l7k512
    - l8k32
    - l8k512
    - l9k32
    - l9k512
    - l10k32
    - l10k512
    - l11k32
    - l11k512
    - l12k32
    - l12k512
  label_rate: 50
  sample_rate: 16000
  max_sample_size: 250000
  min_sample_size: 32000
  pad_audio: false
  random_crop: true
  normalize: false

dataset:
  num_workers: 4
  max_tokens: 300000
  skip_invalid_size_inputs_valid_test: true
  validate_interval: 5
  validate_interval_updates: 5000

criterion:
  _name: hubert_layerwise
  layer_specs: "1:l1k32,1:l1k512,2:l2k32,2:l2k512,3:l3k32,3:l3k512,4:l4k32,4:l4k512,5:l5k32,5:l5k512,6:l6k32,6:l6k512,7:l7k32,7:l7k512,8:l8k32,8:l8k512,9:l9k32,9:l9k512,10:l10k32,10:l10k512,11:l11k32,11:l11k512,12:l12k32,12:l12k512"
  layer_weights: null
  pred_masked_weight: 1.0

optimization:
  max_update: 100000
  lr: [0.0005]
  clip_norm: 10.0

optimizer:
  _name: adam
  adam_betas: (0.9, 0.98)
  adam_eps: 1.0e-06
  weight_decay: 0.01

lr_scheduler:
  _name: polynomial_decay
  warmup_updates: 32000

model:
  _name: hubert
  label_rate: 50
  skip_masked: false
  skip_nomask: false
  mask_prob: 0.08
  mask_length: 10
  extractor_mode: default
  conv_feature_layers: '[(512,10,5)] + [(512,3,2)] * 4 + [(512,2,2)] * 2'
  encoder_layers: 12
  encoder_embed_dim: 384
  encoder_ffn_embed_dim: 1536
  encoder_attention_heads: 6
  final_dim: 256
  encoder_layerdrop: 0.05
  dropout_input: 0.1
  dropout_features: 0.1
  dropout: 0.1
  attention_dropout: 0.1
  feature_grad_mult: 0.1
  untie_final_proj: true
  activation_dropout: 0.0
  layerwise_cls_specs: "1:32,1:512,2:32,2:512,3:32,3:512,4:32,4:512,5:32,5:512,6:32,6:512,7:32,7:512,8:32,8:512,9:32,9:512,10:32,10:512,11:32,11:512,12:32,12:512"

hydra:
  job:
    config:
      override_dirname:
        kv_sep: '-'
        item_sep: '__'
        exclude_keys:
          - run
          - task.data
          - task.label_dir
  run:
    dir: ???
  sweep:
    dir: ???
    subdir: ${hydra.job.config_name}__${hydra.job.override_dirname}
