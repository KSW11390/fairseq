# @package _group_
#
# DICEHuBERT student distillation config for train-clean-100.
# Teacher: HuBERT-base iter-2 (12L/768D, ~95M), layer 6, k-means k=500.
# Student: 12L/384D (~27M) – 3.5x compression.
#
# DICEHuBERT: criterion.label_mode=soft_teacher_logits
# Teacher logits → soft targets via KL divergence (T=5)
#
# Single-GPU (1xA100) config. Debug scale: 10k updates.

common:
  fp16: true
  log_format: json
  log_interval: 100
  seed: 1337
  tensorboard_logdir: tblog

checkpoint:
  save_interval_updates: 5000
  keep_interval_updates: 2
  no_epoch_checkpoints: true

distributed_training:
  ddp_backend: legacy_ddp
  distributed_world_size: 1
  distributed_port: 29671
  nprocs_per_node: 1
  find_unused_parameters: true

task:
  _name: hubert_pretraining
  data: ???
  label_dir: ???
  labels: ["km"]
  label_rate: 50
  sample_rate: 16000
  max_sample_size: 250000
  min_sample_size: 32000
  pad_audio: false
  random_crop: true
  normalize: false

dataset:
  num_workers: 4
  max_tokens: 1000000
  skip_invalid_size_inputs_valid_test: true
  validate_interval: 5
  validate_interval_updates: 2000

criterion:
  _name: hubert_distill
  pred_masked_weight: 1.0
  pred_nomask_weight: 0.0
  loss_weights: [10,]
  label_mode: soft_teacher_logits
  teacher_path: null
  kmeans_path: null
  teacher_layer: 6
  distill_temperature: 5.0
  distill_alpha: 1.0
  teacher_fp16: false

optimization:
  max_update: 10000
  lr: [0.0005]
  clip_norm: 10.0

optimizer:
  _name: adam
  adam_betas: (0.9,0.98)
  adam_eps: 1e-06
  weight_decay: 0.01

lr_scheduler:
  _name: polynomial_decay
  warmup_updates: 3200

model:
  _name: hubert
  label_rate: 50
  skip_masked: false
  skip_nomask: false
  mask_prob: 0.80
  extractor_mode: default
  # CNN feature extractor – MUST match teacher stride for time-alignment
  conv_feature_layers: '[(512,10,5)] + [(512,3,2)] * 4 + [(512,2,2)] * 2'
  # Student: 12-layer, 384-dim (~27M params vs teacher 95M)
  encoder_layers: 12
  encoder_embed_dim: 384
  encoder_ffn_embed_dim: 1536
  encoder_attention_heads: 6
  final_dim: 256
  encoder_layerdrop: 0.05
  dropout_input: 0.1
  dropout_features: 0.1
  dropout: 0.1
  attention_dropout: 0.1
  feature_grad_mult: 0.1
  untie_final_proj: true
  activation_dropout: 0.0

hydra:
  job:
    config:
      override_dirname:
        kv_sep: '-'
        item_sep: '__'
        exclude_keys:
          - run
          - task.data
          - task.label_dir
  run:
    dir: ???
  sweep:
    dir: ???
    subdir: ${hydra.job.config_name}__${hydra.job.override_dirname}
